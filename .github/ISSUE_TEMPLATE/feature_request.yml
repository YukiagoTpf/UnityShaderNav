name: Feature request
description: Suggest a new navigation feature or supported shader shape.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the navigation, indexing, or editor behavior you want.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Shader examples
      description: Paste representative ShaderLab/HLSL examples if available.
      render: hlsl
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What tests or manual checks would prove this is done?
